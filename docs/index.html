<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>周易象數分析儀</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-inner">
        <h1>周易象數分析儀</h1>
        <p>六十四卦查詢、錯卦、綜卦、互卦、三極卦、動爻分析</p>
      </div>
    </header>

    <main class="layout">
      <aside class="panel sidebar">
        <h2>查詢設定</h2>

        <div class="form-group">
          <label for="hexagramId">本卦</label>
          <select id="hexagramId"></select>
        </div>

        <div class="form-group">
          <label>動爻</label>
          <div class="checkbox-group" id="movingLinesGroup">
            <label><input type="checkbox" value="1" /> 初爻</label>
            <label><input type="checkbox" value="2" /> 二爻</label>
            <label><input type="checkbox" value="3" /> 三爻</label>
            <label><input type="checkbox" value="4" /> 四爻</label>
            <label><input type="checkbox" value="5" /> 五爻</label>
            <label><input type="checkbox" value="6" /> 上爻</label>
          </div>
        </div>

        <button id="analyzeBtn" class="btn-primary">開始分析</button>

        <div class="hint-block">
          <div class="hint-title">說明：</div>
          <ul>
            <li>先選本卦，再勾選動爻。</li>
            <li>系統會回傳本卦、錯卦、綜卦、互卦、三極卦與動爻分析。</li>
            <li>前端預設呼叫 <code>https://api.allenyeh.com/analyze</code>。</li>
          </ul>
        </div>
      </aside>

      <section class="content-area">
        <div id="status" class="status">請選擇本卦後開始分析。</div>

        <section class="panel panel-lg">
          <h2>本卦</h2>
          <div id="baseHexagram" class="hexagram-card empty-card">尚未查詢</div>
        </section>

        <div class="grid-two">
          <section class="panel">
            <h2>錯卦</h2>
            <div id="oppositeHexagram" class="hexagram-card empty-card">尚未查詢</div>
          </section>

          <section class="panel">
            <h2>綜卦</h2>
            <div id="inverseHexagram" class="hexagram-card empty-card">尚未查詢</div>
          </section>
        </div>

        <div class="grid-two">
          <section class="panel">
            <h2>互卦</h2>
            <div id="mutualHexagram" class="hexagram-card empty-card">尚未查詢</div>
          </section>

          <section class="panel">
            <h2>變卦 / 之卦</h2>
            <div id="changedHexagram" class="hexagram-card empty-card">尚未查詢</div>
          </section>
        </div>

        <section class="panel panel-lg">
          <h2>三極卦</h2>
          <div class="grid-three">
            <div class="sub-panel">
              <h3>A（123-234）</h3>
              <div id="sanjiA" class="hexagram-card empty-card">尚未查詢</div>
            </div>
            <div class="sub-panel">
              <h3>B（234-345）</h3>
              <div id="sanjiB" class="hexagram-card empty-card">尚未查詢</div>
            </div>
            <div class="sub-panel">
              <h3>C（345-456）</h3>
              <div id="sanjiC" class="hexagram-card empty-card">尚未查詢</div>
            </div>
          </div>
        </section>

        <section class="panel panel-lg">
          <h2>動爻分析</h2>
          <div id="movingLinesText" class="text-block empty-card">尚未查詢</div>
        </section>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
